---
# tasks file for install_docker
- name: Install deps
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Install Docker's official GPG key
  vars:
    docker_gpg_keyring_dir: /etc/apt/keyrings
    docker_gpg_keyring_file: "{{ docker_gpg_keyring_dir }}/docker.asc"
    docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
    docker_gpg_state: present # Change to 'absent' to remove the key
  block:
    - name: Ensure Docker keyring directory exists
      become: true
      ansible.builtin.file:
        path: "{{ docker_gpg_keyring_dir }}"
        state: directory
        mode: "0755"
      when: docker_gpg_state == 'present'

    - name: Download Docker GPG key
      become: true
      ansible.builtin.get_url:
        url: "{{ docker_gpg_url }}"
        dest: "{{ docker_gpg_keyring_file }}"
        mode: "0644"
      when: docker_gpg_state == 'present'

    - name: Remove Docker GPG key
      become: true
      ansible.builtin.file:
        path: "{{ docker_gpg_keyring_file }}"
        state: absent
      when: docker_gpg_state == 'absent'

- name: Add the repository to Apt sources
  become: true
  ansible.builtin.apt_repository:
    repo: >
      deb [arch={{ (ansible_architecture == 'x86_64') | ternary('amd64', ansible_architecture) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    update_cache: true

- name: Install Docker Engine
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
