---
- name: Install Nginx on remote servers
  hosts: all
  remote_user: ubuntu
  become: true
  tasks:
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Start Nginx service
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
